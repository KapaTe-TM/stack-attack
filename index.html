<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stack Attack Ultimate Pro</title>
    <link rel="manifest" href="manifest.json">
        <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        </script>

    <style>
        /* --- БАЗОВЫЕ СТИЛИ --- */
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body {
            background: #1a110a; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #ff9d00; font-family: 'Courier New', monospace; margin: 0; height: 100vh; width: 100vw;
            overflow: hidden; touch-action: none; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ И ИНТЕРФЕЙС --- */
        .ui { width: 100%; display: flex; justify-content: center; align-items: center; padding: 5px 0; position: relative; min-height: 55px;}
        #score { margin: 0; font-size: 24px; z-index: 10; }
        .top-btn {
            width: 44px; height: 44px; background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff9d00; border-radius: 8px; color: #ff9d00;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; cursor: pointer; position: absolute; top: 5px;
        }
        #muteBtn { left: 10px; z-index: 110; }
        #restartBtnTop { left: 65px; z-index: 110; }
        #pauseBtnTop { right: 10px; z-index: 110; }

        /* --- ИГРОВОЕ ПОЛЕ --- */
        canvas { border: 3px solid #111; background: #ffa500; width: 100%; height: auto; max-height: 60vh; aspect-ratio: 21 / 9; image-rendering: pixelated; }
        .main-container { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .game-area { width: 100%; max-width: 95vw; display: flex; flex-direction: column; align-items: center; }

        /* --- МОБИЛЬНЫЕ КНОПКИ --- */
        .controls { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; pointer-events: none; }
        .btn-group { display: flex; gap: 10px; pointer-events: auto; }
        .btn { width: 70px; height: 70px; background: rgba(0, 0, 0, 0.5); border: 3px solid #ff9d00; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #ff9d00; pointer-events: auto; }
        .btn:active { background: #ff9d00; color: #1a110a; }
        .jump-btn { width: 90px; height: 90px; border-radius: 50%; font-size: 16px; }

        /* --- АЛЬБОМНЫЙ РЕЖИМ --- */
        @media (orientation: landscape) and (max-height: 500px) {
            .main-container { flex-direction: row; justify-content: space-around; }
            .game-area { width: 65%; order: 2; }
            canvas { max-height: 75vh; }
            .controls { position: absolute; width: 100%; height: 100%; top: 0; left: 0; padding: 0 20px; flex-direction: row; align-items: flex-end; }
        }

        /* --- ОВЕРЛЕИ --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .window { background: #222; border: 4px solid #ff9d00; padding: 25px; border-radius: 20px; text-align: center; width: 320px; }
        .char-selector { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        .arrow-btn { background: none; border: 2px solid #ff9d00; color: #ff9d00; font-size: 24px; padding: 5px 15px; border-radius: 10px; cursor: pointer; }
        #menuCanvas { background: #333; border: 2px solid #444; border-radius: 10px; width: 80px; height: 100px; }
        .main-btn { background: #ff9d00; color: #111; border: none; padding: 12px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; width: 100%; font-family: inherit; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="muteBtn" class="top-btn">🔊</div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="startMenu" class="overlay">
        <div class="window">
            <h1>STACK ATTACK</h1>
            <p>ВЫБЕРИ ЦВЕТ:</p>
            <div class="char-selector">
                <button class="arrow-btn" id="prevSkin">&lt;</button>
                <canvas id="menuCanvas" width="80" height="100"></canvas>
                <button class="arrow-btn" id="nextSkin">&gt;</button>
            </div>
            <button class="main-btn" id="startBtn">СТАРТ</button>
        </div>
    </div>

    <!-- КОНЕЦ ИГРЫ -->
    <div id="gameOverMenu" class="overlay hidden">
        <div class="window">
            <h1 style="color: #ff4400;">GAME OVER</h1>
            <p id="finalScoreText" style="font-size: 24px;">СЧЕТ: 0000</p>
            <button class="main-btn" id="retryBtn">ЗАНОВО</button>
        </div>
    </div>

    <div class="main-container">
        <div class="game-area">
            <div class="ui">
                <div id="restartBtnTop" class="top-btn">R</div>
                <h2 id="score">0000</h2>
                <div id="pauseBtnTop" class="top-btn">||</div>
            </div>
            <canvas id="gameCanvas" width="630" height="270"></canvas>
        </div>
        <div class="controls">
            <div class="btn-group">
                <div id="leftBtn" class="btn">←</div>
                <div id="rightBtn" class="btn">→</div>
            </div>
            <div id="jumpBtn" class="btn jump-btn">JUMP</div>
        </div>
    </div>

<script>
// --- ЗВУКОВОЙ ДВИЖОК ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let craneOsc = null, isMuted = false;

function playSound(f, t, d, v, ramp=true) {
    if (isMuted) return;
    try {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        if (ramp) g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e){}
}

const sounds = {
    step: () => playSound(120, 'triangle', 0.05, 0.05),
    land: () => playSound(40, 'sine', 0.25, 0.6),
    jump: () => { if(isMuted)return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.setValueAtTime(150, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime+0.1); o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.03, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+0.1); },
    win: () => { if(isMuted)return; [523, 659, 783].forEach((f, i) => setTimeout(() => playSound(f, 'square', 0.2, 0.05), i*100)); },
    death: () => { if(isMuted)return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(300, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime+0.5); o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.3, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+0.5); },
    craneOn: () => { if(isMuted || craneOsc) return; craneOsc=audioCtx.createOscillator(); const g=audioCtx.createGain(); craneOsc.type='sawtooth'; craneOsc.frequency.value=40; craneOsc.connect(g); g.connect(audioCtx.destination); g.gain.value=0.01; craneOsc.start(); craneOsc.gainNode=g; },
    craneOff: () => { if(craneOsc){craneOsc.stop(); craneOsc=null;} }
};

// --- КОНФИГУРАЦИЯ ---
const TILE_SIZE = 30, COLS = 21, ROWS = 9;
const COLORS = { box: "#5a2d0c", falling: "#8b4513", sinking: "#3d2616", lines: "rgba(255,255,255,0.25)", shirt: "#ffffff", skin: "#ffdbac", crane1: "#111", crane2: "#d0d0d0", outline: "#000" };
const SKINS = ["#003399", "#b30000", "#006600"];
let skinIdx = 0, score, isPaused, isGameOver, grid, gameSpeedMult, fallingBlocks, player, gameActive = false, sinkingRows = [], spawnTimer = 0, cranes = [];
const activeKeys = { left: false, right: false };

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const menuCanvas = document.getElementById('menuCanvas'), mCtx = menuCanvas.getContext('2d');
const scoreEl = document.getElementById('score'), startMenu = document.getElementById('startMenu'), gameOverMenu = document.getElementById('gameOverMenu'), muteBtn = document.getElementById('muteBtn');

// --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
function renderPlayer(tCtx, x, y, suitColor, dir=1, animFrame=0, isJumping=false, isPushing=false) {
    const pw = 22, ph = 30; let walk = Math.sin(animFrame * 0.8) * 3;
    tCtx.save(); tCtx.translate(x, y);
    if (dir === -1) { tCtx.translate(pw, 0); tCtx.scale(-1, 1); }
    const dp = (px, py, w, h, c) => { tCtx.fillStyle = COLORS.outline; tCtx.fillRect(px - 1, py - 1, w + 2, h + 2); tCtx.fillStyle = c; tCtx.fillRect(px, py, w, h); };
    if (isJumping) { dp(2, ph-6, 7, 5, suitColor); dp(pw-9, ph-6, 7, 5, suitColor); }
    else { dp(2+walk, ph-8, 8, 8, suitColor); dp(pw-10-walk, ph-8, 8, 8, suitColor); }
    tCtx.fillStyle=COLORS.outline; tCtx.fillRect(1, ph*0.3-1, pw-2, ph*0.45+2); tCtx.fillStyle=COLORS.shirt; tCtx.fillRect(2, ph*0.3, pw-4, ph*0.45);
    tCtx.fillStyle=suitColor; tCtx.fillRect(2, ph*0.5, pw-4, ph*0.25); tCtx.fillRect(2, ph*0.3, 4, ph*0.3); tCtx.fillRect(pw-6, ph*0.3, 4, ph*0.3);
    if (isPushing) { dp(pw-2, ph*0.4, 8, 5, COLORS.shirt); dp(pw+4, ph*0.4, 4, 5, COLORS.skin); }
    else { dp(1-walk*0.5, ph*0.4, 5, 9, COLORS.shirt); dp(pw-6+walk*0.5, ph*0.4, 5, 9, COLORS.shirt); }
    dp(pw/2-6, 4, 12, 11, COLORS.skin); dp(pw/2-8, 0, 16, 6, suitColor); dp(pw/2+2, 2, 9, 3, suitColor);
    tCtx.restore();
}

function createCrane(color, side) { return { x: side === 1 ? -60 : canvas.width + 60, targetX: 0, speed: 6, state: 'hidden', cargoType: 1, side: side, color: color }; }
function updateMuteBtnVisibility() { if (!gameActive || isPaused || isGameOver) muteBtn.classList.remove('hidden'); else muteBtn.classList.add('hidden'); }
function toggleMute() { isMuted = !isMuted; muteBtn.innerText = isMuted ? "🔈" : "🔊"; if (isMuted) sounds.craneOff(); else if(gameActive && !isPaused) sounds.craneOn(); }

function resetGame() {
    score = 0; isPaused = false; isGameOver = false; gameSpeedMult = 0.5; spawnTimer = 0;
    grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
    player = { x: 10 * TILE_SIZE, y: (ROWS - 1) * TILE_SIZE, vy: 0, isJumping: false, w: 22, h: 30, dir: 1, animFrame: 0, isPushing: false, suitColor: SKINS[skinIdx] };
    cranes = [createCrane(COLORS.crane1, 1)]; fallingBlocks = []; sinkingRows = []; scoreEl.innerText = "0000";
    for (let i = 0; i < 15; i++) { let rx = Math.floor(Math.random()*COLS), ry = ROWS-1-Math.floor(Math.random()*2); if (rx<9 || rx>11) grid[ry][rx]=Math.floor(Math.random()*3)+1; }
}

function startGame() { if (audioCtx.state === 'suspended') audioCtx.resume(); resetGame(); gameActive = true; startMenu.classList.add('hidden'); gameOverMenu.classList.add('hidden'); updateMuteBtnVisibility(); }
function triggerGameOver() { if (isGameOver) return; isGameOver = true; gameActive = false; sounds.craneOff(); sounds.death(); document.getElementById('finalScoreText').innerText = "СЧЕТ: " + score.toString().padStart(4, '0'); gameOverMenu.classList.remove('hidden'); updateMuteBtnVisibility(); }

// --- ЛОГИКА ОБНОВЛЕНИЯ ---
function update() {
    if (!gameActive || isPaused || isGameOver) return;
    if (score >= 1000 && cranes.length === 1) { gameSpeedMult = 0.5; cranes.push(createCrane(COLORS.crane2, -1)); }
    let ms = 6 * gameSpeedMult; player.isPushing = false;

    if (activeKeys.left || activeKeys.right) {
        let oldF = Math.floor(player.animFrame); player.animFrame += 0.2;
        if (Math.floor(player.animFrame) !== oldF && !player.isJumping) sounds.step();
        player.dir = activeKeys.left ? -1 : 1;
        let dx = activeKeys.left ? -ms : ms, nX = player.x + dx, tX = activeKeys.left ? nX : nX + player.w;
        if (!isSolid(tX, player.y + 5) && !isSolid(tX, player.y + player.h - 5)) player.x = Math.max(0, Math.min(canvas.width - player.w, nX));
        else if (!player.isJumping) {
            let gx = Math.floor(tX/TILE_SIZE), gy = Math.floor((player.y+player.h/2)/TILE_SIZE), bX = activeKeys.left ? gx - 1 : gx + 1;
            if (gx >= 0 && gx < COLS && grid[gy] && grid[gy][gx] > 0 && !(gy > 0 && grid[gy - 1][gx] > 0) && bX >= 0 && bX < COLS && grid[gy][bX] === 0) { player.isPushing = true; grid[gy][bX] = grid[gy][gx]; grid[gy][gx] = 0; }
        }
    } else player.animFrame = 0;

    player.vy += 0.35; player.y += player.vy;
    if (player.vy < 0 && (isSolid(player.x + 4, player.y) || isSolid(player.x + player.w - 4, player.y))) { player.vy = 0; player.y = (Math.floor(player.y / TILE_SIZE) + 1) * TILE_SIZE; }
    let footY = player.y + player.h;
    if (player.vy >= 0 && (isSolid(player.x + 4, footY) || isSolid(player.x + player.w - 4, footY))) { if (player.isJumping) sounds.land(); player.y = Math.floor(footY / TILE_SIZE) * TILE_SIZE - player.h; player.vy = 0; player.isJumping = false; } else player.isJumping = true;

    spawnTimer++; let curInt = Math.max(60, 140 - (score / 100) * 5); let anyC = false;
    cranes.forEach((c, idx) => {
        let off = idx === 0 ? 0 : 35;
        if ((spawnTimer + off) % Math.floor(curInt) === 0 && c.state === 'hidden') { c.targetX = Math.floor(Math.random() * COLS) * TILE_SIZE; c.cargoType = Math.floor(Math.random() * 3) + 1; c.state = 'entering'; }
        let s = c.speed * gameSpeedMult * 4; if (c.state !== 'hidden') anyC = true;
        if (c.state === 'entering') {
            let d = c.targetX - c.x; if (Math.abs(d) <= s) { c.x = c.targetX; if (grid[Math.floor(c.x / TILE_SIZE)] > 0) triggerGameOver(); else { fallingBlocks.push({ x: c.x, y: 15, active: true, speed: 1.5, type: c.cargoType, isFromSky: true }); c.state = 'leaving'; } }
            else c.x += Math.sign(d) * s;
        } else if (c.state === 'leaving') { let ex = c.side === 1 ? -100 : canvas.width + 100; if (Math.abs(ex - c.x) <= s) { c.x = ex; c.state = 'hidden'; } else c.x += Math.sign(ex - c.x) * s; }
    });
    if (anyC) sounds.craneOn(); else sounds.craneOff();

    for (let i = fallingBlocks.length - 1; i >= 0; i--) {
        let b = fallingBlocks[i]; b.y += b.speed * (gameSpeedMult * 2.5);
        if (b.isFromSky && Math.abs((player.x+player.w/2)-(b.x+TILE_SIZE/2)) < TILE_SIZE * 0.6 && player.y < b.y + TILE_SIZE - 5 && player.y + player.h > b.y + 5) triggerGameOver();
        let gx = Math.floor(b.x/TILE_SIZE), gy = Math.floor((b.y + TILE_SIZE - 1) / TILE_SIZE);
        if (gy >= ROWS || (gy >= 0 && grid[gy][gx] > 0)) { sounds.land(); let ty = gy - 1; if (ty >= 0) grid[ty][gx] = b.type; fallingBlocks.splice(i, 1); if (b.isFromSky && gx === Math.floor((player.x+player.w/2)/TILE_SIZE) && ty === Math.floor((player.y+player.h/2)/TILE_SIZE)) triggerGameOver(); }
    }
    for (let r = ROWS - 2; r >= 0; r--) for (let c = 0; c < COLS; c++) if (grid[r][c] > 0 && grid[r+1][c] === 0 && !fallingBlocks.some(b => Math.floor(b.x/TILE_SIZE) === c && b.y > r*TILE_SIZE)) { let t = grid[r][c]; grid[r][c] = 0; fallingBlocks.push({ x: c * TILE_SIZE, y: r * TILE_SIZE, active: true, speed: 1.5, type: t, isFromSky: false }); }
    sinkingRows.forEach((row, i) => { row.y += 2; row.opacity -= 0.02; if (row.y > canvas.height || row.opacity <= 0) sinkingRows.splice(i, 1); });
    for (let r = 0; r < ROWS; r++) if (grid[r].every(cell => cell > 0)) { sounds.win(); sinkingRows.push({ y: r * TILE_SIZE, opacity: 1, types: [...grid[r]] }); grid.splice(r, 1); grid.unshift(Array(COLS).fill(0)); score += 100; scoreEl.innerText = score.toString().padStart(4, '0'); gameSpeedMult = Math.min(1.5, 0.5 + (score/100)*0.05); }
}

// --- ОТРИСОВКА ---
function drawBox(x, y, color, type) {
    ctx.strokeStyle = COLORS.outline; ctx.lineWidth = 3; ctx.strokeRect(x+1, y+1, TILE_SIZE-2, TILE_SIZE-2); ctx.fillStyle = color; ctx.fillRect(x+1, y+1, TILE_SIZE-2, TILE_SIZE-2);
    ctx.fillStyle = COLORS.outline; ctx.fillRect(x+4, y+4, 2, 2); ctx.fillRect(x+TILE_SIZE-6, y+4, 2, 2); ctx.fillRect(x+4, y+TILE_SIZE-6, 2, 2); ctx.fillRect(x+TILE_SIZE-6, y+TILE_SIZE-6, 2, 2);
    ctx.strokeStyle = COLORS.lines; ctx.lineWidth = 1;
    if (type === 1) ctx.strokeRect(x+6, y+6, TILE_SIZE-12, TILE_SIZE-12);
    else if (type === 2) { ctx.beginPath(); ctx.moveTo(x+7,y+7); ctx.lineTo(x+TILE_SIZE-7,y+TILE_SIZE-7); ctx.moveTo(x+TILE_SIZE-7,y+7); ctx.lineTo(x+7,y+TILE_SIZE-7); ctx.stroke(); }
    else if (type === 3) { ctx.beginPath(); ctx.moveTo(x+5,y+TILE_SIZE/2-3); ctx.lineTo(x+TILE_SIZE-5,y+TILE_SIZE/2-3); ctx.moveTo(x+5,y+TILE_SIZE/2+3); ctx.lineTo(x+TILE_SIZE-5,y+TILE_SIZE/2+3); ctx.stroke(); }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!gameActive && !isGameOver) return;
    let gr = ctx.createLinearGradient(0, 0, 0, 12); gr.addColorStop(0, '#333'); gr.addColorStop(0.5, '#777'); gr.addColorStop(1, '#222');
    ctx.fillStyle = gr; ctx.fillRect(0, 0, canvas.width, 12); ctx.fillStyle = "#111"; for(let i=0; i<canvas.width; i+=40) ctx.fillRect(i+5, 4, 2, 2);
    cranes.forEach(c => { ctx.fillStyle = COLORS.outline; ctx.fillRect(c.x + 1, 6, TILE_SIZE - 2, 10); ctx.fillStyle = c.color; ctx.fillRect(c.x + 2, 5, TILE_SIZE - 4, 8); if (c.state === 'entering') drawBox(c.x, 15, COLORS.falling, c.cargoType); });
    sinkingRows.forEach(row => { ctx.globalAlpha = row.opacity; row.types.forEach((t, c) => drawBox(c * TILE_SIZE, row.y, COLORS.sinking, t)); }); ctx.globalAlpha = 1.0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c] > 0) drawBox(c * TILE_SIZE, r * TILE_SIZE, COLORS.box, grid[r][c]);
    fallingBlocks.forEach(b => drawBox(b.x, b.y, b.isFromSky ? COLORS.falling : COLORS.box, b.type));
    if (player) renderPlayer(ctx, player.x, player.y, player.suitColor, player.dir, player.animFrame, player.isJumping, player.isPushing);
    if (isPaused) { ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "30px Courier New"; ctx.fillText("PAUSE", canvas.width/2, canvas.height/2); }
}

// --- УПРАВЛЕНИЕ ---
function isSolid(px, py) { let gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE); return gx < 0 || gx >= COLS || gy >= ROWS || (gy >= 0 && grid[gy][gx] > 0); }
function jumpAction() { if (player && !player.isJumping && !isPaused && gameActive) { player.vy = -7.2; player.isJumping = true; sounds.jump(); } }
function pauseAction() { if (gameActive && !isGameOver) { isPaused = !isPaused; if (isPaused) sounds.craneOff(); updateMuteBtnVisibility(); } }

window.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') activeKeys.left = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') activeKeys.right = true;
    if (e.code === 'Space') jumpAction();
    if (e.code === 'Enter') { if (!gameActive) startGame(); else pauseAction(); }
    if (e.code === 'KeyR') { if(isGameOver || !gameActive) startGame(); else resetGame(); }
});
window.addEventListener('keyup', e => { if (e.code === 'ArrowLeft' || e.code === 'KeyA') activeKeys.left = false; if (e.code === 'ArrowRight' || e.code === 'KeyD') activeKeys.right = false; });

const bindBtn = (id, act) => {
    const el = document.getElementById(id); if(!el) return;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); if (act === 'left') activeKeys.left = true; if (act === 'right') activeKeys.right = true; if (act === 'jump') jumpAction(); if (act === 'pause') pauseAction(); if (act === 'restart') { if(isGameOver || !gameActive) startGame(); else resetGame(); } });
    el.addEventListener('touchend', (e) => { e.preventDefault(); if (act === 'left') activeKeys.left = false; if (act === 'right') activeKeys.right = false; });
};
bindBtn('leftBtn', 'left'); bindBtn('rightBtn', 'right'); bindBtn('jumpBtn', 'jump'); bindBtn('pauseBtnTop', 'pause'); bindBtn('restartBtnTop', 'restart');
muteBtn.addEventListener('click', toggleMute);
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('prevSkin').addEventListener('click', () => { skinIdx = (skinIdx - 1 + SKINS.length) % SKINS.length; sounds.step(); });
document.getElementById('nextSkin').addEventListener('click', () => { skinIdx = (skinIdx + 1) % SKINS.length; sounds.step(); });

// Меню анимация
function menuLoop() { if (!gameActive) { mCtx.clearRect(0, 0, menuCanvas.width, menuCanvas.height); renderPlayer(mCtx, 29, 35, SKINS[skinIdx], 1, Date.now()*0.008); } requestAnimationFrame(menuLoop); }
menuLoop();

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
